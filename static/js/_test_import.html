<!DOCTYPE html>
<html><head><meta charset="utf-8"></head><body>
<pre id="out"></pre>
<script type="module">
const out = document.getElementById('out');
const results = [];
const mods = ['state.js','flightService.js','api.js','search-page.js','results-page.js','flight-profile.js','app.js'];
for (const m of mods) {
  try {
    await import('/static/js/' + m);
    results.push('OK: ' + m);
  } catch(e) {
    results.push('FAIL: ' + m + ' — ' + e.message + '\n  stack: ' + (e.stack || ''));
  }
}
out.textContent = results.join('\n\n');
</script>
</body></html>
